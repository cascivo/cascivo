name: CI

on:
  pull_request:
    paths:
      - 'apps/**'
      - 'packages/**'
      - 'pnpm-lock.yaml'
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Format + lint (vp check)
        run: pnpm exec vp check

      - name: Brand guard (no cascade→cascivo regression)
        run: pnpm run brand:check

      - name: Claims guard (hardcoded counts match reality)
        run: pnpm run claims:check

      - name: Release-filter guard (build:release covers all published packages)
        run: pnpm run release:check

      - name: Meta-coverage guard (every manifest is registered)
        run: pnpm run meta:check

      - name: Animation audit
        run: pnpm run audit:animation

      - name: Signals subscription gate
        run: pnpm run audit:signals

      - name: Demo storage-key collision check
        run: pnpm run demos:storage:check

      - name: Standalone-install integrity (deps graph)
        run: |
          pnpm run deps:check:test
          pnpm run deps:check
          pnpm run deps:smoke

      - name: Prop-documentation coverage
        run: pnpm run docs:coverage

      - name: Story audit (orphan stories)
        run: pnpm run audit:stories

      - name: Landing link check (no broken internal routes)
        run: pnpm run links:check

      # Parallel build: vp orders by the dependency graph, so independent
      # packages build concurrently while dependents still wait for their deps.
      # The cold-cache *sequential* ordering guard lives in local `pnpm ready:ci`.
      - name: Build (vp run -r build)
        run: pnpm exec vp run -r build

      - name: Bundle budgets
        run: pnpm run audit:bundle

      - name: Type check (vp run -r check)
        run: pnpm exec vp run -r check

      - name: Test (vp run -r test)
        run: pnpm run test

      - name: Doctor (component rule violations)
        run: node packages/cli/dist/index.mjs doctor --ci

  drift:
    runs-on: ubuntu-latest
    steps:
      # Full history (not the default shallow depth-1 clone) — sitemap
      # generation (scripts/sitemap/generate.ts) derives `lastmod` per URL
      # from `git log` on each source file. On a shallow clone, `git log`
      # finds no history for files untouched by the single fetched commit
      # and silently falls back to today's date, so the regenerated
      # sitemap.xml never matches the committed one and this job always
      # reports drift that isn't real.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Regenerate generated artifacts
        run: |
          pnpm run regen
          pnpm exec vp check --fix

      - name: Fail if generated artifacts drifted
        run: |
          if ! git diff --exit-code -- ':!docs/**' || [ -n "$(git status --porcelain -- ':!docs/**')" ]; then
            git status --porcelain -- ':!docs/**'
            echo '::error::Generated artifacts are stale. Run `pnpm regen && pnpm exec vp check --fix` and commit the result.'
            exit 1
          fi

      - name: Registry count check
        run: |
          COUNT=$(node -e "const r=JSON.parse(require('fs').readFileSync('registry.json','utf8')); \
            console.log((r.components?.length??0)+(r.charts?.length??0)+(r.layouts?.length??0)+(r.blocks?.length??0))")
          # Moving floor: bump on release. A guard of 49 would let a
          # mass-deletion regression to a quarter of the registry pass.
          if [ "$COUNT" -lt 185 ]; then
            echo "::error::Registry has $COUNT entries — expected >= 185"
            exit 1
          fi
          echo "Registry count: $COUNT (>= 185)"
