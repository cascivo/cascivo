name: Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: cf-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Detect which apps changed ─────────────────────────────────────────────
  changes:
    runs-on: ubuntu-latest
    outputs:
      site: ${{ steps.out.outputs.site }}
      storybook: ${{ steps.out.outputs.storybook }}
      playground: ${{ steps.out.outputs.playground }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        if: github.event_name == 'push'
        with:
          filters: |
            site:
              # The unified site (cascivo.com) serves the marketing front door,
              # the docs, AND the five demos under /demos/<slug>/, so a change to
              # the app, any demo, the example kit, or shared packages redeploys it.
              - 'apps/site/**'
              - 'apps/examples/deploy/**'
              - 'apps/examples/pay/**'
              - 'apps/examples/flow/**'
              - 'apps/examples/track/**'
              - 'apps/examples/pulse/**'
              - 'apps/examples/trade/**'
              - 'apps/examples/kit/**'
              - 'scripts/assemble-demos.mjs'
              - 'packages/**'
              # Docs sources + the generators + the registry all feed the served
              # /docs, /llms, and machine-readable surfaces. Without these, a docs-only
              # or generator-only change merges without redeploying the site — the
              # staleness the 2026-07-18 report hit. A spurious deploy is free.
              - 'docs/**'
              - 'scripts/**'
              - 'registry.json'
              - 'pnpm-lock.yaml'
            storybook:
              - 'apps/storybook/**'
              - 'packages/**'
              - 'pnpm-lock.yaml'
            playground:
              - 'apps/examples/json-playground/**'
              - 'packages/render/**'
              - 'packages/react/**'
              - 'pnpm-lock.yaml'
      - id: out
        env:
          FORCE: ${{ github.event_name == 'workflow_dispatch' }}
          SITE: ${{ steps.filter.outputs.site }}
          STORYBOOK: ${{ steps.filter.outputs.storybook }}
          PLAYGROUND: ${{ steps.filter.outputs.playground }}
        run: |
          echo "site=$(     [ "$FORCE" = "true" ] && echo true || echo "$SITE"      )" >> $GITHUB_OUTPUT
          echo "storybook=$([ "$FORCE" = "true" ] && echo true || echo "$STORYBOOK" )" >> $GITHUB_OUTPUT
          echo "playground=$([ "$FORCE" = "true" ] && echo true || echo "$PLAYGROUND" )" >> $GITHUB_OUTPUT

  # ── Shared install + build step ───────────────────────────────────────────
  # Each app builds in its own job so failures are isolated and CF Pages
  # deployments happen in parallel.

  deploy-site:
    needs: changes
    if: needs.changes.outputs.site == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Build the unified site, then build + assemble the five demos into
      # apps/site/dist/demos/<slug>/ so one deploy serves the marketing front
      # door, the docs, the /examples/* pages, and every live demo.
      - run: pnpm run build:landing-demos
      # Deploy from apps/site so Wrangler picks up apps/site/functions/ (it resolves
      # the Functions directory relative to its working directory, not the assets arg).
      # The Functions serve machine-readable 404s for /llms/*, /context/*, /r/*.
      - working-directory: apps/site
        run: >
          npx wrangler pages deploy dist
          --project-name=${{ vars.CF_PROJECT_SITE || 'cascade-ui-landing' }}
          ${{ github.event_name == 'pull_request' && format('--branch=pr-{0}', github.event.number) || '--branch=main' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

  # ── Verify the production deploy actually serves the current registry version ──
  # The 2026-07-18 adopter report read docs 4 days stale from the (now retired)
  # docs.cascivo.com. cascivo.com is the single canonical host; this job fails the
  # workflow unless it serves content generated from the just-deployed registry.json,
  # and confirms docs.cascivo.com 301s to it.
  verify-site:
    needs: deploy-site
    if: needs.changes.outputs.site == 'true' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Probe the canonical host for freshness
        run: bash scripts/checks/deployed-freshness.sh
        env:
          FRESHNESS_RETRIES: '20' # ~5 min of CDN-propagation tolerance
          FRESHNESS_SLEEP: '15'
          # Remove this once the docs.cascivo.com → cascivo.com 301 is configured in
          # Cloudflare (docs/internal/OPS-HOSTS.md). Until then, only the canonical-host
          # freshness assertion runs; the redirect assertion is skipped.
          FRESHNESS_SKIP_REDIRECT: '1'

  deploy-storybook:
    needs: changes
    if: needs.changes.outputs.storybook == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build Storybook
        run: pnpm --filter @cascivo/storybook exec storybook build
      - run: >
          npx wrangler pages deploy apps/storybook/storybook-static
          --project-name=${{ vars.CF_PROJECT_STORYBOOK || 'cascade-ui-storybook' }}
          ${{ github.event_name == 'pull_request' && format('--branch=pr-{0}', github.event.number) || '--branch=main' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

  deploy-playground:
    needs: changes
    if: needs.changes.outputs.playground == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec vp run @cascivo/json-playground#build
      - run: >
          npx wrangler pages deploy apps/examples/json-playground/dist
          --project-name=${{ vars.CF_PROJECT_PLAYGROUND || 'cascade-ui-playground' }}
          ${{ github.event_name == 'pull_request' && format('--branch=pr-{0}', github.event.number) || '--branch=main' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
