name: Marketplace

on:
  push:
    branches: [main]
    paths:
      - 'directory/**'
      - 'templates/**'
      - 'scripts/registry/build-marketplace.ts'
      - 'packages/registry/src/marketplace.ts'
  schedule:
    # Rebuild the catalog daily to pick up newly published / updated templates.
    - cron: '17 6 * * *'
  workflow_dispatch:

concurrency:
  group: marketplace-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-catalog:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build marketplace catalog
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/registry/build-marketplace.ts

      # The committed catalog must pass `vp check`, or every checkout after a
      # bot rebuild fails the format gate.
      - name: Format catalog
        run: pnpm exec vp fmt apps/site/public/marketplace.json

      - name: Commit catalog if changed
        run: |
          if ! git diff --quiet -- apps/site/public/marketplace.json; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add apps/site/public/marketplace.json
            git commit -m "chore(marketplace): rebuild catalog [skip ci]"
            git push
          else
            echo "Catalog unchanged."
          fi
