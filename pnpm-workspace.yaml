packages:
  - 'packages/*'
  - 'apps/*'
  - 'apps/examples/*'
  - 'apps/bench/*'

catalogMode: prefer

catalog:
  '@types/node': ^25
  '@types/react': ^19.2.17
  '@types/react-dom': ^19.2.3
  '@preact/signals-react': ^3
  '@testing-library/jest-dom': ^6.9.1
  '@testing-library/react': ^16.3.2
  '@testing-library/user-event': ^14
  jsdom: ^29
  preact: ^10
  react: ^19.2.7
  react-dom: ^19.2.7
  next: ^16
  typescript: ^5
  vite-plus: ^0.2.1
  '@modelcontextprotocol/sdk': ^1.29.0
  zod: ^4.4.3
  valibot: ^1.0.0
  preact-iso: ^2.12.0
  shiki: ^4.2.0
  storybook: ^10.4.2
  '@storybook/react-vite': ^10.4.2
  '@storybook/addon-a11y': ^10.4.2
  '@storybook/addon-themes': ^10.4.2
  'fast-check': ^4.0.0
  '@tsdown/css': ^0.22.2
  '@changesets/cli': ^2.31.0
  '@playwright/test': ^1.61.0
  vitest: 4.1.9
  esbuild: ^0.28.0
  '@lhci/cli': ^0.15.1
  '@axe-core/playwright': ^4.11.3
  vite-imagetools: ^10.0.1

overrides:
  vite: 'npm:@voidzero-dev/vite-plus-core@0.2.1'
  vitest: '4.1.9'
  # Align the two axe-core consumers on one version: @axe-core/playwright (the
  # sweep) injects axe into the same Storybook iframe where @storybook/addon-a11y
  # already bundles it. Two versions on window.axe → "unknown rule" errors. Pin to
  # the version @axe-core/playwright itself depends on so the sweep's rule
  # behaviour is unchanged (4.12 tightens contrast heuristics beyond the gate's
  # established baseline).
  axe-core: '4.11.4'

allowBuilds:
  '@carbon/colors': true
  '@carbon/feature-flags': true
  '@carbon/grid': true
  '@carbon/icon-helpers': true
  '@carbon/icons-react': true
  '@carbon/layout': true
  '@carbon/motion': true
  '@carbon/react': true
  '@carbon/styles': true
  '@carbon/themes': true
  '@carbon/type': true
  '@carbon/utilities': true
  '@ibm/plex': true
  '@ibm/plex-mono': true
  '@ibm/plex-sans': true
  '@ibm/plex-sans-arabic': true
  '@ibm/plex-sans-devanagari': true
  '@ibm/plex-sans-hebrew': true
  '@ibm/plex-sans-thai': true
  '@ibm/plex-sans-thai-looped': true
  '@ibm/plex-serif': true
  '@parcel/watcher': true
  esbuild: true
  sharp: true

minimumReleaseAgeExclude:
  - '@voidzero-dev/vite-plus-core@0.2.1'
  - '@voidzero-dev/vite-plus-darwin-arm64@0.2.1'
  - '@voidzero-dev/vite-plus-darwin-x64@0.2.1'
  - '@voidzero-dev/vite-plus-linux-arm64-gnu@0.2.1'
  - '@voidzero-dev/vite-plus-linux-arm64-musl@0.2.1'
  - '@voidzero-dev/vite-plus-linux-x64-gnu@0.2.1'
  - '@voidzero-dev/vite-plus-linux-x64-musl@0.2.1'
  - '@voidzero-dev/vite-plus-win32-arm64-msvc@0.2.1'
  - '@voidzero-dev/vite-plus-win32-x64-msvc@0.2.1'
  - vite-plus@0.2.1

patchedDependencies:
  '@changesets/cli@2.31.0': patches/@changesets__cli@2.31.0.patch
