# Trusted publishing via npm OIDC — no NPM_TOKEN required.
# Prerequisites (one-time manual setup):
#   1. For each Tier-1 package on npmjs.com, go to Settings → Trusted Publisher
#      and add a GitHub Actions publisher: org=cascivo, repo=cascivo,
#      workflow=release.yml (no environment needed).
#   2. For the first publish bootstrap, see docs/RELEASING.md.
# After setup, every merge to main with a staged changeset triggers this workflow.
# See docs/RELEASING.md for the full release runbook.

name: Release

on:
  push:
    branches:
      - main
    # Only run when something publishable changes. A changeset-driven release
    # always touches `.changeset/**` (the changeset file, then its removal in the
    # Version PR) and `packages/**` (version bumps + CHANGELOGs). Docs-only or
    # app-only pushes never publish, so they should not start a release.
    paths:
      - 'packages/**'
      - '.changeset/**'

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write # changesets commits + tags
      pull-requests: write # the "Version Packages" PR
      id-token: write # OIDC for npm trusted publishing

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Defense in depth: the PR `drift` job already keeps `main` in sync, but a
      # publish must never ship stale generated docs (READMEs, registry.json,
      # llms.txt, context, schema). Regenerate and fail the release if anything
      # drifted — this leaves the tree clean in the normal case (committed ==
      # generated), so it is safe to run before changesets touches git.
      - name: Verify generated docs are up to date
        run: |
          pnpm run regen
          pnpm exec vp check --fix
          if ! git diff --exit-code -- ':!docs/**' || [ -n "$(git status --porcelain -- ':!docs/**')" ]; then
            git status --porcelain -- ':!docs/**'
            echo '::error::Generated docs are stale at release time. Run `pnpm regen && pnpm exec vp check --fix` and commit the result.'
            exit 1
          fi

      - name: Create Release Pull Request or Publish to npm
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm run version-packages
          publish: pnpm run release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
