name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Format + lint (vp check)
        run: pnpm exec vp check

      - name: Build (vp run -r build)
        run: pnpm run build

      - name: Type check (vp run -r check)
        run: pnpm exec vp run -r check

      - name: Test (vp run -r test)
        run: pnpm run test

  drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Regenerate generated artifacts
        run: |
          pnpm run registry:generate
          pnpm run readme:generate

      - name: Fail if generated artifacts drifted
        run: |
          if ! git diff --exit-code || [ -n "$(git status --porcelain)" ]; then
            git status --porcelain
            echo '::error::Generated artifacts are stale. Run `pnpm registry:generate && pnpm readme:generate` and commit the result.'
            exit 1
          fi
