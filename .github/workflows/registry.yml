name: Registry

on:
  push:
    branches: [main]
    paths:
      - 'packages/components/**'
      - 'scripts/registry/**'

permissions:
  contents: write

jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Generate registry.json
        run: pnpm run registry:generate
        env:
          REGISTRY_BASE_URL: https://raw.githubusercontent.com/${{ github.repository }}/main

      - name: Commit if changed
        run: |
          if ! git diff --quiet registry.json; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add registry.json
            git commit -m "chore: regenerate registry.json [skip ci]"
            git push
          else
            echo "registry.json unchanged"
          fi
