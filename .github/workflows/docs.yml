name: Docs

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: docs-deploy
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build workspace deps
        run: pnpm --filter "@cascade-ui/docs^..." run build

      - name: Build docs
        run: pnpm exec vp run @cascade-ui/docs#build

      # SPA fallback so deep links like /components/button resolve.
      # Note: assumes the site is served from the domain root (custom domain
      # or org/user page) — the router uses absolute paths.
      - name: Add SPA fallback
        run: cp apps/docs/dist/index.html apps/docs/dist/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/docs/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
