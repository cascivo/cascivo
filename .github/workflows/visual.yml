name: Visual regression

# Nightly + manual only (not PR-blocking): a stale baseline should alert,
# not block unrelated PRs. Use the workflow_dispatch `update` input to
# regenerate baselines when rendering legitimately changes.
on:
  schedule:
    - cron: '17 3 * * *'
  workflow_dispatch:
    inputs:
      update:
        description: 'Regenerate baselines and commit them'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  visual:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Install Chromium
        run: pnpm --filter @cascivo/site exec playwright install chromium --with-deps

      - name: Build docs
        run: pnpm exec vp run @cascivo/site#build

      - name: Screenshot components (3 themes)
        if: ${{ !inputs.update }}
        run: pnpm --filter @cascivo/site run test:visual

      - name: Upload diff report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/site/test-results
          retention-days: 7

      # Escape hatch: rendering legitimately changed → refresh baselines.
      - name: Regenerate + commit baselines
        if: ${{ inputs.update }}
        run: |
          pnpm --filter @cascivo/site run test:visual -- --update-snapshots
          if ! git diff --quiet apps/site/test/snapshots; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add apps/site/test/snapshots
            git commit -m "chore: update visual regression baselines [skip ci]"
            git push
          fi
