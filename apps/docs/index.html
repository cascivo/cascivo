<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>cascivo docs</title>
    <meta
      name="description"
      content="cascivo design system — CSS-native, signal-driven, AI-first React components"
    />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="theme-color" content="#0079bf" />
    <meta property="og:title" content="cascivo docs" />
    <meta
      property="og:description"
      content="CSS-native, signal-driven, AI-first React design system. Browse components, explore context, and build with AI."
    />
    <meta property="og:url" content="https://cascivo.com/docs" />
    <meta property="og:type" content="website" />
    <script>
      // Apply the persisted theme before paint to avoid a flash of the wrong theme.
      ;(function () {
        try {
          var t = localStorage.getItem('cascade-theme')
          document.documentElement.setAttribute(
            'data-theme',
            t === 'dark' || t === 'warm' || t === 'light' ? t : 'light',
          )
        } catch (e) {}
      })()
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
