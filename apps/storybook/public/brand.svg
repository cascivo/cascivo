<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 48" role="img" aria-label="cascivo">
  <title>cascivo</title>
  <!-- Mark: three descending rounded bars forming a "C". Colors hardcoded so the
       logo renders correctly in the Storybook manager chrome, where the cascivo
       CSS custom properties are not defined. -->
  <rect x="4" y="6" width="32" height="8" rx="4" fill="#0079bf" />
  <rect x="4" y="20" width="26" height="8" rx="4" fill="#0079bf" />
  <rect x="4" y="34" width="32" height="8" rx="4" fill="#0079bf" />
  <text x="52" y="34"
        font-family="ui-sans-serif, system-ui, -apple-system, sans-serif"
        font-size="24" font-weight="600" letter-spacing="-0.02em"
        fill="#0b1220">cascivo</text>
</svg>
