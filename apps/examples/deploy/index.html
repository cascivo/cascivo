<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cascivo Deploy</title>
    <style>
      /* Declare layer order — cascivo.reset is lowest priority so component layers win */
      @layer cascivo.reset, cascivo.tokens, cascivo.component, cascivo.example, cascivo.theme;

      @layer cascivo.reset {
        *,
        *::before,
        *::after {
          box-sizing: border-box;
          margin: 0;
          padding: 0;
        }
      }

      html,
      body {
        height: 100%;
      }
      #root {
        height: 100%;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
