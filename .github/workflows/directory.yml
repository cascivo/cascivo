name: Directory

on:
  pull_request:
    paths:
      - 'directory/**'

concurrency:
  group: directory-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Validate directory
        run: pnpm exec tsx scripts/directory/validate.ts
