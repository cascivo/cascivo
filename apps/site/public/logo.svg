<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 48" role="img" aria-label="cascivo">
  <title>cascivo</title>
  <!-- Mark: three descending rounded bars forming a "C" -->
  <!-- Bar 1: top, full width -->
  <rect x="4" y="6" width="32" height="8" rx="4" fill="var(--cascivo-brand-primary, currentColor)"/>
  <!-- Bar 2: middle, shorter on the right — creates the "C" opening -->
  <rect x="4" y="20" width="26" height="8" rx="4" fill="var(--cascivo-brand-primary, currentColor)"/>
  <!-- Bar 3: bottom, full width -->
  <rect x="4" y="34" width="32" height="8" rx="4" fill="var(--cascivo-brand-primary, currentColor)"/>
  <!-- Wordmark -->
  <text x="52" y="34"
        font-family="ui-sans-serif, system-ui, -apple-system, sans-serif"
        font-size="24" font-weight="600" letter-spacing="-0.02em"
        fill="currentColor">cascivo</text>
</svg>
