<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>cascivo — Component Docs</title>
    <meta
      name="description"
      content="cascivo design system — CSS-native, signal-driven, AI-first React components"
    />
    <script>
      // Apply the persisted theme before paint to avoid a flash of the wrong theme.
      ;(function () {
        try {
          var t = localStorage.getItem('cascade-theme')
          document.documentElement.setAttribute(
            'data-theme',
            t === 'dark' || t === 'warm' || t === 'light' ? t : 'light',
          )
        } catch (e) {}
      })()
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
